<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unite Group | Tuyển dụng</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary: #0061f2;
            --bg-light: #f8faff;
            --text-main: #111827;
            --text-sub: #4b5563;
            --card-bg: rgba(255, 255, 255, 0.92); 
            --card-border: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-light);
            color: var(--text-main);
            font-family: 'Space Grotesk', sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            perspective: 1200px;
        }

        .cosmic-bg {
            position: fixed; inset: 0; z-index: -2;
            background: linear-gradient(135deg, #ffffff 0%, #eef2f6 100%);
        }

        .orb {
            position: absolute; border-radius: 50%;
            filter: blur(80px); opacity: 0.6;
            animation: orb-float 25s infinite ease-in-out alternate;
        }
        .orb-1 { width: 600px; height: 600px; background: #e0e7ff; top: -20%; left: -10%; }
        .orb-2 { width: 500px; height: 500px; background: #ccfbf1; bottom: -15%; right: -15%; animation-delay: -5s; }
        
        @keyframes orb-float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(30px, 20px) scale(1.05); }
        }

        .card-wrapper {
            width: 90%; max-width: 420px;
            transform-style: preserve-3d;
            transition: transform 0.1s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            position: relative;
            z-index: 10;
        }

        .glass-interface {
            position: relative;
            background: var(--card-bg);
            backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            border: 2px solid var(--card-border);
            border-radius: 32px;
            padding: 40px 25px;
            box-shadow: 
                0 20px 40px -10px rgba(0, 0, 0, 0.1),
                0 0 0 1px rgba(0, 0, 0, 0.02);
            transform-style: preserve-3d;
            display: flex;
            flex-direction: column;
            max-height: 85vh; 
        }

        .logo-card {
            width: 130px; height: 130px;
            margin: 0 auto 20px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(25px) saturate(180%);
            -webkit-backdrop-filter: blur(25px) saturate(180%);
            border: 2px solid #fff;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1), inset 0 0 20px rgba(255,255,255,0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            z-index: 10;
            transform: translateZ(30px);
            flex-shrink: 0;
        }

        .logo-card::before {
            content: '';
            position: absolute; inset: -6px;
            border-radius: 50%;
            background: conic-gradient(from 0deg, transparent, rgba(255, 215, 0, 0.5), transparent);
            animation: rotate-glow 5s linear infinite;
            z-index: -1;
            filter: blur(12px);
        }
        @keyframes rotate-glow { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .logo-img {
            width: 75%; height: 75%;
            object-fit: contain;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1));
        }

        .text-content { text-align: center; transform: translateZ(20px); margin-bottom: 20px; flex-shrink: 0; }
        
        h1 {
            font-family: 'Outfit', sans-serif; font-weight: 800; font-size: 32px;
            color: var(--text-main);
            margin-bottom: 4px; 
            letter-spacing: -1px;
            line-height: 1.1;
            text-transform: uppercase;
        }
        
        .subtitle {
            color: var(--primary);
            font-size: 13px; font-weight: 700;
            letter-spacing: 1.2px; text-transform: uppercase;
        }

        /* Thanh công cụ nhỏ (Refresh + Note) */
        .toolbar {
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 5px 10px;
            font-size: 11px; color: #6b7280;
            transform: translateZ(40px);
        }
        .refresh-btn {
            background: none; border: none; cursor: pointer;
            color: var(--primary); font-weight: 700;
            display: flex; align-items: center; gap: 4px;
            padding: 4px 8px; border-radius: 8px;
            transition: background 0.2s;
        }
        .refresh-btn:hover { background: rgba(0, 97, 242, 0.1); }
        .refresh-btn:active { transform: scale(0.95); }

        .links-container {
            display: flex; flex-direction: column; gap: 14px;
            transform: translateZ(40px);
            overflow-y: auto;
            padding: 5px;
            flex-grow: 1; 
        }
        
        .links-container::-webkit-scrollbar { width: 4px; }
        .links-container::-webkit-scrollbar-thumb { background: #e5e7eb; border-radius: 4px; }

        .cyber-btn {
            position: relative; display: flex; align-items: center;
            padding: 12px 14px;
            background: #ffffff;
            border: 1px solid #e5e7eb;
            border-radius: 20px;
            color: var(--text-main); text-decoration: none;
            transition: all 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        .cyber-btn:hover { 
            transform: translateY(-4px) scale(1.02); 
            border-color: rgba(255,255,255,0);
            box-shadow: 0 15px 35px -5px rgba(0, 0, 0, 0.15);
        }

        .icon-box {
            width: 44px; height: 44px;
            border-radius: 14px;
            display: flex; justify-content: center; align-items: center;
            font-size: 18px; color: white;
            margin-right: 14px; flex-shrink: 0;
            box-shadow: 0 8px 16px rgba(0,0,0,0.15);
        }

        .icon-sales { background: linear-gradient(135deg, #FF6B6B, #EE5D5D); }
        .icon-cskh { background: linear-gradient(135deg, #4FACFE, #00F2FE); }
        .icon-photo { background: linear-gradient(135deg, #FA709A, #FEE140); }
        .icon-bds  { background: linear-gradient(135deg, #11998e, #38ef7d); }
        .icon-default { background: linear-gradient(135deg, #667eea, #764ba2); } 

        .btn-text { flex-grow: 1; text-align: left; }
        .btn-text h3 { font-size: 14px; font-weight: 800; margin-bottom: 3px; color: #1f2937; text-transform: uppercase; letter-spacing: 0.5px; }
        .btn-text p { font-size: 12px; color: #6b7280; font-weight: 500; margin: 0; line-height: 1.3; }
        
        .arrow { 
            width: 28px; height: 28px; display: flex; align-items: center; justify-content: center;
            background: #f3f4f6; border-radius: 50%;
            color: var(--text-sub); transition: 0.3s;
            font-size: 12px;
        }
        .cyber-btn:hover .arrow { 
            background: var(--primary); color: white; transform: translateX(2px); 
        }

        /* Error/Loading Message Styles */
        .status-message {
            text-align: center; font-size: 13px; font-weight: 500;
            padding: 15px; border-radius: 12px;
            margin-bottom: 10px; line-height: 1.5;
        }
        .status-loading { color: var(--primary); background: rgba(0, 97, 242, 0.05); }
        .status-error { color: #dc2626; background: rgba(220, 38, 38, 0.05); border: 1px dashed #dc2626; }
        .status-warning { color: #d97706; background: rgba(217, 119, 6, 0.05); border: 1px dashed #d97706; }

        canvas { position: fixed; inset: 0; z-index: -1; pointer-events: none; }

        @media (max-height: 700px) {
            .logo-card { width: 100px; height: 100px; margin-bottom: 15px; }
            h1 { font-size: 28px; }
            .glass-interface { padding: 30px 20px; }
        }
    </style>
</head>
<body>

    <div class="cosmic-bg">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
    </div>
    
    <canvas id="particleCanvas"></canvas>

    <div class="card-wrapper" id="card">
        <div class="glass-interface">
            <div class="logo-card">
                <img src="https://techbytruong.wordpress.com/wp-content/uploads/2025/12/unite-group-gold-doc-png-1-e1767002671511.png" alt="Unite Group" class="logo-img">
            </div>

            <div class="text-content">
                <h1>UNITE GROUP</h1>
                <p class="subtitle">TUYỂN DỤNG CÁC VỊ TRÍ</p>
            </div>

            <!-- Toolbar mới -->
            <div class="toolbar">
                <span id="last-updated">Cập nhật: Vừa xong</span>
                <button class="refresh-btn" onclick="initApp(true)">
                    <i class="fa-solid fa-rotate"></i> Làm mới
                </button>
            </div>

            <div class="links-container" id="job-list">
                <div class="status-message status-loading">
                    <i class="fa-solid fa-circle-notch fa-spin"></i><br>Đang tải dữ liệu...
                </div>
            </div>
        </div>
    </div>

    <script>
        // ==========================================
        // CẤU HÌNH GOOGLE SHEETS
        // ==========================================
        const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTleEWf1dxh3aXqcdlBiVdXWGZ6BrFObJnZNDj-SeTBu2QiHI2gqfrOx2fUN-wONkW9yw6weaDsJZTG/pub?gid=0&single=true&output=csv'; 

        const fallbackJobs = [
            { hienThi: "1", tieuDe: "CHUYÊN VIÊN TƯ VẤN (OFFLINE)", moTa: "Vui lòng kiểm tra kết nối mạng", link: "#", icon: "fa-solid fa-wifi", mau: "icon-sales" },
        ];

        const jobListContainer = document.getElementById('job-list');
        const lastUpdatedText = document.getElementById('last-updated');

        function updateTime() {
            const now = new Date();
            const timeString = now.toLocaleTimeString('vi-VN', { hour: '2-digit', minute: '2-digit' });
            lastUpdatedText.innerText = `Lần cuối: ${timeString}`;
        }

        function renderJobs(jobs) {
            jobListContainer.innerHTML = ''; 
            
            if (!jobs || jobs.length === 0) {
                 jobListContainer.innerHTML = `
                    <div class="status-message status-warning">
                        <i class="fa-solid fa-triangle-exclamation"></i><br>
                        Đã kết nối nhưng Sheet trống.<br>
                        Lưu ý: Google Sheet cần 3-5 phút để cập nhật ra web sau khi bạn sửa.
                    </div>`;
                 return;
            }

            let count = 0;
            jobs.forEach(job => {
                const hienThi = String(job.hienThi || "").trim();
                if (hienThi !== "1") return;

                count++;
                const a = document.createElement('a');
                a.href = job.link || "#";
                a.className = 'cyber-btn';
                a.target = '_blank';
                
                const colorClass = job.mau ? job.mau.trim() : 'icon-default';
                const iconClass = job.icon ? job.icon.trim() : 'fa-solid fa-circle';

                a.innerHTML = `
                    <div class="icon-box ${colorClass}"><i class="${iconClass}"></i></div>
                    <div class="btn-text">
                        <h3>${job.tieuDe}</h3>
                        <p>${job.moTa}</p>
                    </div>
                    <div class="arrow"><i class="fa-solid fa-chevron-right"></i></div>
                `;
                jobListContainer.appendChild(a);
            });

            if (count === 0) {
                jobListContainer.innerHTML = `
                    <div class="status-message status-warning">
                        Dữ liệu đã tải nhưng tất cả đang bị ẩn.<br>
                        Hãy đợi 3-5 phút nếu bạn vừa sửa số 0 thành 1.
                    </div>`;
            }
            updateTime();
        }

        function parseCSV(csvText) {
            const lines = csvText.split(/\r\n|\n/);
            const result = [];
            const headers = [];
            let headerLineIndex = -1;

            for(let i=0; i<lines.length; i++) {
                if(lines[i].trim().length > 0) {
                    const cols = lines[i].split(',').map(c => c.trim().replace(/^"|"$/g, '').toLowerCase());
                    if(cols.includes('hienthi') || cols.includes('tieude')) {
                        headerLineIndex = i;
                        cols.forEach((col, index) => { headers[col] = index; });
                        break;
                    }
                }
            }

            if (headerLineIndex === -1) return [];

            for (let i = headerLineIndex + 1; i < lines.length; i++) {
                const line = lines[i].trim();
                if (!line) continue;
                
                const cols = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(val => {
                    return val.trim().replace(/^"|"$/g, '').replace(/""/g, '"');
                });

                const getItem = (key, defaultIndex) => {
                    if (headers[key] !== undefined && cols[headers[key]] !== undefined) return cols[headers[key]];
                    return cols[defaultIndex] || "";
                };

                if (cols.length > 1) { 
                    result.push({
                        hienThi: getItem('hienthi', 0),
                        tieuDe: getItem('tieude', 1),
                        moTa: getItem('mota', 2),
                        link: getItem('link', 3),
                        icon: getItem('icon', 4),
                        mau: getItem('mau', 5)
                    });
                }
            }
            return result;
        }

        async function initApp(isManualRefresh = false) {
            // Hiển thị trạng thái đang tải nếu bấm nút làm mới
            if (isManualRefresh) {
                jobListContainer.innerHTML = '<div class="status-message status-loading"><i class="fa-solid fa-circle-notch fa-spin"></i><br>Đang làm mới...</div>';
                const icon = document.querySelector('.refresh-btn i');
                if(icon) icon.classList.add('fa-spin');
            }

            if (window.location.protocol === 'file:') {
                jobListContainer.innerHTML = `<div class="status-message status-error">Lỗi: Vui lòng không mở trực tiếp file HTML.</div>`;
                return;
            }

            if (SHEET_CSV_URL && SHEET_CSV_URL.includes('http')) {
                try {
                    // Cực mạnh tay với Cache: Thêm timestamp và header
                    const bustCacheUrl = `${SHEET_CSV_URL}&nocache=${Date.now()}`;
                    const response = await fetch(bustCacheUrl, { 
                        cache: "no-store",
                        headers: { 'Pragma': 'no-cache', 'Cache-Control': 'no-cache' }
                    });
                    
                    if (!response.ok) throw new Error(`HTTP ${response.status}`);
                    const text = await response.text();
                    const sheetJobs = parseCSV(text);
                    renderJobs(sheetJobs);

                } catch (error) {
                    console.error("Lỗi tải Sheet:", error);
                    jobListContainer.innerHTML = `<div class="status-message status-error">Mất kết nối. Đang thử lại...</div>`;
                    setTimeout(() => renderJobs(fallbackJobs), 3000);
                } finally {
                    // Tắt xoay icon làm mới
                    const icon = document.querySelector('.refresh-btn i');
                    if(icon) icon.classList.remove('fa-spin');
                }
            } else {
                renderJobs(fallbackJobs);
            }
        }

        initApp();

        // --- 3D & PARTICLES ---
        const card = document.getElementById('card');
        const wrapper = document.body;
        let centerBeta = null; let centerGamma = null;

        wrapper.addEventListener('mousemove', (e) => {
            const x = (window.innerWidth / 2 - e.pageX) / 35;
            const y = (window.innerHeight / 2 - e.pageY) / 35;
            card.style.transform = `rotateY(${x}deg) rotateX(${y}deg)`;
        });
        wrapper.addEventListener('mouseleave', () => {
            card.style.transform = `rotateY(0deg) rotateX(0deg)`;
        });

        if (window.DeviceOrientationEvent) {
            window.addEventListener('deviceorientation', (e) => {
                if (e.beta === null || e.gamma === null) return;
                if (centerBeta === null) { centerBeta = e.beta; centerGamma = e.gamma; }

                const smoothFactor = 0.03; 
                centerBeta = centerBeta * (1 - smoothFactor) + e.beta * smoothFactor;
                centerGamma = centerGamma * (1 - smoothFactor) + e.gamma * smoothFactor;

                let tiltX = e.beta - centerBeta; let tiltY = e.gamma - centerGamma;
                const maxTilt = 20;
                tiltX = Math.min(Math.max(tiltX, -maxTilt), maxTilt);
                tiltY = Math.min(Math.max(tiltY, -maxTilt), maxTilt);
                card.style.transform = `rotateY(${tiltY}deg) rotateX(${-tiltX}deg)`;
            });
            window.addEventListener('touchstart', () => { centerBeta = null; centerGamma = null; }, {passive: true});
        }

        const canvas = document.getElementById('particleCanvas');
        const ctx = canvas.getContext('2d');
        let particlesArray;
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;

        class Particle {
            constructor(x, y) {
                this.x = x; this.y = y;
                this.size = Math.random() * 2 + 0.5;
                this.speedX = (Math.random() * 0.5) - 0.25; this.speedY = (Math.random() * 0.5) - 0.25;
            }
            update() {
                this.x += this.speedX; this.y += this.speedY;
                if (this.x > canvas.width || this.x < 0) this.speedX = -this.speedX;
                if (this.y > canvas.height || this.y < 0) this.speedY = -this.speedY;
            }
            draw() {
                ctx.fillStyle = '#94a3b8'; ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill();
            }
        }
        function init() {
            particlesArray = [];
            let numberOfParticles = (canvas.width * canvas.height) / 18000;
            for (let i = 0; i < numberOfParticles; i++) {
                let x = Math.random() * canvas.width; let y = Math.random() * canvas.height;
                particlesArray.push(new Particle(x, y));
            }
        }
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < particlesArray.length; i++) {
                particlesArray[i].update(); particlesArray[i].draw();
                for (let j = i; j < particlesArray.length; j++) {
                    const dx = particlesArray[i].x - particlesArray[j].x;
                    const dy = particlesArray[i].y - particlesArray[j].y;
                    const distance = Math.sqrt(dx * dx + dy * dy);
                    if (distance < 110) {
                        ctx.beginPath();
                        ctx.strokeStyle = `rgba(148, 163, 184, ${0.25 - distance/440})`;
                        ctx.lineWidth = 0.6;
                        ctx.moveTo(particlesArray[i].x, particlesArray[i].y);
                        ctx.lineTo(particlesArray[j].x, particlesArray[j].y);
                        ctx.stroke();
                    }
                }
            }
            requestAnimationFrame(animate);
        }
        window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; init(); });
        init(); animate();
    </script>
</body>
</html>
